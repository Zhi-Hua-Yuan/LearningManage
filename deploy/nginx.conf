server {
    # 监听 80 端口（用户在浏览器直接输 IP 访问的就是 80 端口）
    listen 80;
    server_name localhost;

    # 规则 1：处理前端静态页面
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # 极其重要：这是 Vue/React 单页应用必须配的，防止刷新页面报 404
        try_files $uri $uri/ /index.html;
    }

    # 规则 2：反向代理（解决跨域）
    # 当浏览器请求以 /api/ 开头的接口时，Nginx 会悄悄把请求转发给后端
    location /api/ {
        # 魔法在这里：'backend' 是我们马上要在 docker-compose 里定义的服务名
        # Nginx 会自动把 backend 翻译成后端集装箱的内网 IP
        proxy_pass http://backend:8123/api/;

        # 把用户的真实 IP 传递给后端，不然你在代码里拿到的全都是 Nginx 的 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}